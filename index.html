<!DOCTYPE html>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kelime Koşusu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    background: #0a0a1a;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
  #canvas { display: block; width: 100%; height: 100%; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  }
  #score-display {
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff88;
    letter-spacing: 1px;
  }
  #lives-display {
    display: flex; gap: 6px; align-items: center;
  }
  .heart { font-size: clamp(18px, 4vw, 26px); transition: transform 0.3s; }
  #combo-display {
    font-size: clamp(13px, 3vw, 20px);
    font-weight: 800;
    color: #ffdd00;
    text-shadow: 0 0 15px #ffaa00;
    min-width: 80px; text-align: center;
  }
  #combo-msg {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: clamp(22px, 6vw, 42px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 20;
    white-space: nowrap;
  }
  #flash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.15s;
  }
  #screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; pointer-events: all;
    background: linear-gradient(135deg, #0d0d2b 0%, #1a0a3a 50%, #0d1a2b 100%);
  }
  #screen.hidden { display: none; }
  .screen-title {
    font-size: clamp(36px, 10vw, 72px);
    font-weight: 900;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #ffdd00, #00ffff);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:300%} }
  .screen-sub {
    font-size: clamp(13px, 3.5vw, 20px);
    color: #aac;
    text-align: center;
    max-width: 340px;
    margin: 14px auto;
    line-height: 1.5;
    padding: 0 20px;
  }
  .btn {
    padding: clamp(14px,3.5vw,20px) clamp(36px,8vw,60px);
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 800;
    border: none; border-radius: 50px;
    cursor: pointer; pointer-events: all;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 1px;
    margin: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00ccff, #9900ff);
    color: #fff;
    box-shadow: 0 0 30px #00ccff88, 0 6px 30px #00000088;
  }
  .btn-primary:active { transform: scale(0.95); }
  .btn-secondary {
    background: linear-gradient(135deg, #ff6600, #ff0080);
    color: #fff;
    box-shadow: 0 0 30px #ff660088, 0 6px 30px #00000088;
  }
  .btn-secondary:active { transform: scale(0.95); }
  .stat-row {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    margin: 14px 0;
  }
  .stat-box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 12px 22px;
    text-align: center;
    min-width: 100px;
  }
  .stat-val {
    font-size: clamp(22px, 6vw, 38px);
    font-weight: 900;
    color: #fff;
  }
  .stat-lbl {
    font-size: clamp(10px, 2.5vw, 14px);
    color: #99aacc;
    margin-top: 2px;
  }
  #best-score-line {
    color: #ffdd00;
    font-size: clamp(13px, 3vw, 18px);
    font-weight: 700;
    margin: 6px 0;
    text-shadow: 0 0 15px #ffaa00;
  }
  #mute-btn {
    position: fixed; bottom: 20px; right: 20px;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    color: #fff; font-size: 20px;
    cursor: pointer; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all;
  }
  #touch-hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: clamp(11px, 2.5vw, 14px);
    pointer-events: none;
    z-index: 10;
    text-align: center;
  }
  #loading-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: #0a0a1a;
    display: flex; align-items: center; justify-content: center;

    border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid #00ffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

// ---- Audio Engine ----
let musicNodes = {}; // tuttuğumuz node referansları
let musicStarted = false;
let masterGain = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

// Genel tek ton çalma
function playTone(freq, type, duration, vol = 0.3, target) {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(target || masterGain);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playKick() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(masterGain);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(1.0, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(); osc.stop(ctx.currentTime + 0.18);
  } catch(e) {}
}

function playSnare() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.04));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 1200;
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    src.start(); src.stop(ctx.currentTime + 0.14);
  } catch(e) {}
}

function playHiHat(open = false) {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 9000;
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(open ? 0.2 : 0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (open ? 0.09 : 0.03));
    src.start(); src.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

function playRiffNote(freq, vol = 0.38) {
  if (muted || !freq) return;
  try {
    const ctx = getAudioCtx();
    // Distorted guitar: sawtooth + clip with waveshaper
    const osc = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const ws = ctx.createWaveShaper();
    const gain = ctx.createGain();
    // Distortion curve
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 256 - 1;
      curve[i] = (Math.PI + 300) * x / (Math.PI + 300 * Math.abs(x));
    }
    ws.curve = curve;
    ws.oversample = '2x';
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    osc2.type = 'sawtooth'; osc2.frequency.value = freq * 1.005; // slight detune
    osc.connect(ws); osc2.connect(ws);
    ws.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(); osc2.start();
    osc.stop(ctx.currentTime + 0.2); osc2.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function playLeadNote(freq) {
  if (muted || !freq) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0.14, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

function playBassNote(freq) {
  if (muted || !freq) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    osc.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.24);
    osc.start(); osc.stop(ctx.currentTime + 0.26);
  } catch(e) {}
}

function musicStep() {
  const s = beatStep % 32;

  // Kick: 0, 16 + offbeat 8, 24
  if (s === 0 || s === 16) playKick();
  if (s === 10 || s === 26) playKick();

  // Snare: 8, 24
  if (s === 8 || s === 24) playSnare();

  // Hi-hat: every 2 steps
  if (s % 2 === 0) playHiHat(s % 8 === 4);

  // Ana riff (guitar distortion)
  playRiffNote(RIFF[s]);

  // Üst lead melodi
  playLeadNote(LEAD[s]);

  // Bas
  playBassNote(BASSLINE2[s]);

  beatStep++;
}

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  beatStep = 0;
  try { getAudioCtx().resume(); } catch(e) {}
  musicInterval = setInterval(musicStep, STEP_MS);
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  musicStarted = false;
}

// ---- Countdown Restart ----
let countdownTimer = null;

function startCountdown() {
  const COUNTDOWN_SEC = 5;
  let remaining = COUNTDOWN_SEC;
  const countEl = document.getElementById('btn-restart-countdown');
  const barEl = document.getElementById('btn-restart-bar');

  if (!countEl || !barEl) return;

  countEl.textContent = `(${remaining})`;
  barEl.style.transition = 'none';
  barEl.style.transform = 'scaleX(1)';

  // Trigger CSS transition for bar
  requestAnimationFrame(() => {
    barEl.style.transition = `transform ${COUNTDOWN_SEC}s linear`;
    barEl.style.transform = 'scaleX(0)';
  });

  countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      restartGame();
    } else {
      countEl.textContent = `(${remaining})`;
    }
  }, 1000);
}

function stopCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  const countEl = document.getElementById('btn-restart-countdown');
  const barEl = document.getElementById('btn-restart-bar');
  if (countEl) countEl.textContent = '';
  if (barEl) { barEl.style.transition = 'none'; barEl.style.transform = 'scaleX(1)'; }
}

// ---- Gate System ----
function pickWordPair() {
  if (pendingPairs.length === 0) {
    // Shuffle a fresh batch
    const shuffled = [...WORD_PAIRS].sort(() => Math.random() - 0.5);
    pendingPairs = shuffled;
  }
  let pair;
  // Avoid last used
  do { pair = pendingPairs.pop(); } while (pendingPairs.length > 0 && WORD_PAIRS.indexOf(pair) === lastWordIndex);
  lastWordIndex = WORD_PAIRS.indexOf(pair);
  return pair;
}

function spawnGate(zPos) {
  const pair = pickWordPair();
  const correctOnRight = Math.random() > 0.5;

  const gateGroup = new THREE.Group();
  gateGroup.position.z = zPos;

  // Gate frame L
  const makeFrame = (xPos, isCorrect, label) => {
    const g = new THREE.Group();
    // Main arch — her iki kapı da aynı renk (cevap ipucu yok)
    const archMat = new THREE.MeshPhongMaterial({
      color: 0x1a1a3a,
      emissive: 0x0a0a22,
      transparent: true, opacity: 0.88, shininess: 80
    });
    const backGeo = new THREE.BoxGeometry(GATE_WIDTH, GATE_HEIGHT, 0.25);
    const back = new THREE.Mesh(backGeo, archMat);
    back.position.set(xPos, GATE_HEIGHT / 2, 0);
    g.add(back);

    // Border — her iki kapı aynı neon mavi/mor
    const borderMat = new THREE.MeshBasicMaterial({ color: 0x8844ff });
    const bTop = new THREE.Mesh(new THREE.BoxGeometry(GATE_WIDTH + 0.1, 0.12, 0.3), borderMat);
    bTop.position.set(xPos, GATE_HEIGHT + 0.06, 0.05);
    g.add(bTop);
    const bBot = new THREE.Mesh(new THREE.BoxGeometry(GATE_WIDTH + 0.1, 0.12, 0.3), borderMat);
    bBot.position.set(xPos, 0.06, 0.05);
    g.add(bBot);
    const bL = new THREE.Mesh(new THREE.BoxGeometry(0.12, GATE_HEIGHT + 0.2, 0.3), borderMat);
    bL.position.set(xPos - GATE_WIDTH / 2 - 0.06, GATE_HEIGHT / 2, 0.05);
    g.add(bL);
    const bR = new THREE.Mesh(new THREE.BoxGeometry(0.12, GATE_HEIGHT + 0.2, 0.3), borderMat);
    bR.position.set(xPos + GATE_WIDTH / 2 + 0.06, GATE_HEIGHT / 2, 0.05);
    g.add(bR);

    // Canvas-based text sprite — her iki kapı aynı renk paleti
    const sprite = makeTextSprite(label);
    sprite.position.set(xPos, GATE_HEIGHT / 2 + 0.1, 0.3);
    g.add(sprite);

    return { group: g, isCorrect, xPos, sprite, label };
  };

  const leftData = makeFrame(LANE_LEFT, !correctOnRight, correctOnRight ? pair.wrong : pair.correct);
  const rightData = makeFrame(LANE_RIGHT, correctOnRight, correctOnRight ? pair.correct : pair.wrong);

  gateGroup.add(leftData.group);
  gateGroup.add(rightData.group);
  scene.add(gateGroup);

  gates.push({
    group: gateGroup,
    left: leftData,
    right: rightData,
    passed: false,
    zPos
  });
}

function makeTextSprite(text) {
  // Her iki kapı için aynı renk — cevap ipucu yok
  const color = '#e8e0ff';
  const bgColor = '#15123a';
  const cv = document.createElement('canvas');
  cv.width = 640; cv.height = 220;
  const ctx = cv.getContext('2d');

  ctx.fillStyle = bgColor;
  if (ctx.roundRect) { ctx.roundRect(4, 4, 632, 212, 22); ctx.fill(); }
  else { ctx.fillRect(4, 4, 632, 212); }

  ctx.fillStyle = color;
  ctx.font = 'bold 82px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#aa88ff';
  ctx.shadowBlur = 24;
  ctx.fillText(text, 320, 114, 610);

  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(4.2, 1.45, 1);
  return sprite;
}

// ---- Game Logic ----
function handleCorrect() {
  score += 10;
  combo++;
  correctCount++;

  let bonus = 0;
  if (combo === 3) { bonus = 5; showComboMsg('Harika! 🔥'); playCombo(); }
  else if (combo === 5) { bonus = 10; showComboMsg('Seri yakaladın! ⚡'); playCombo(); }
  else if (combo > 5 && combo % 5 === 0) { bonus = 10; showComboMsg('Mükemmel! 🌟'); playCombo(); }
  else if (combo >= 2) {
    const msgs = ['Çok iyi gidiyorsun!', 'Mükemmel seçim!', 'Devam et!'];
    if (Math.random() > 0.5) showComboMsg(msgs[Math.floor(Math.random() * msgs.length)]);
  }

  score += bonus;
  if (score < 0) score = 0;

  playCorrect();
  flashScreen('rgba(0,255,100,0.3)', 250);
  spawnParticles(player.position.x, 2, player.position.z - 2, 0x00ff88, 14);
  updateHUD();
}

function handleWrong() {
  score = Math.max(0, score - 5);
  lives--;
  combo = 0;
  wrongCount++;

  playWrong();
  flashScreen('rgba(255,0,50,0.55)', 400);
  shakeTimer = 0.5;
  shakeAmt = 0.25;
  spawnParticles(player.position.x, 2, player.position.z - 2, 0xff3333, 10);
  updateHUD();

  if (lives <= 0) endGame();
}

function endGame() {
  gameState = 'gameover';
  stopMusic();
  if (score > bestScore) { bestScore = score; localStorage.setItem('kk_best', bestScore); }

  document.getElementById('final-score').textContent = score;
  document.getElementById('final-correct').textContent = correctCount;
  document.getElementById('final-wrong').textContent = wrongCount;

  hudEl.style.display = 'none';
  touchHint.style.display = 'none';

// ---- Controls ----
let moveDir = 0;
const LANES = [LANE_LEFT, LANE_MID, LANE_RIGHT];
let currentLane = 1; // 0=left, 1=mid, 2=right

// Hız modifier: oyuncu hızlanabilir/yavaşlayabilir
let speedBoost = 0; // -1=brake, 0=normal, +1=boost
const BOOST_AMOUNT = 0.10;
const BRAKE_AMOUNT = 0.07;
const MIN_SPEED = 0.03;
const MAX_BOOST_SPEED = 0.45;

function speedUp() {
  if (gameState !== 'playing') return;
  speedBoost = 1;
  showSpeedHint('⚡ HIZLI!', '#00ffcc');
}
function slowDown() {
  if (gameState !== 'playing') return;
  speedBoost = -1;
  showSpeedHint('🐢 YAVAŞ', '#ffaa00');
}
function resetBoost() {
  speedBoost = 0;
}

let speedHintTimeout = null;
function showSpeedHint(msg, color) {
  const el = document.getElementById('speed-hint');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color;
  el.style.opacity = '1';
  clearTimeout(speedHintTimeout);
  speedHintTimeout = setTimeout(() => { el.style.opacity = '0'; }, 800);
}

function moveLeft() {
  if (gameState !== 'playing') return;
  if (currentLane > 0) currentLane--;
  playerTargetX = LANES[currentLane];
}
function moveRight() {
  if (gameState !== 'playing') return;
  if (currentLane < 2) currentLane++;
  playerTargetX = LANES[currentLane];
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') moveLeft();
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
  if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') { e.preventDefault(); speedUp(); }
  if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') { e.preventDefault(); slowDown(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' ||
      e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') resetBoost();
});

// Touch — 4 bölge: Sol-Üst=Sol+Hızlan, Sol-Alt=Sol+Yavaş, Sağ-Üst=Sağ+Hızlan, Sağ-Alt=Sağ+Yavaş
// Basılı tutunca hız devam eder, bırakınca normale döner
let activeTouches = new Set();

document.addEventListener('touchstart', e => {
  const tag = e.target.tagName;
  if (tag === 'BUTTON' || e.target.closest('button') || e.target.id === 'mute-btn') return;

  if (gameState === 'playing') {
    e.preventDefault();
    for (const t of e.changedTouches) {
      activeTouches.add(t.identifier);
      const isRight = t.clientX >= window.innerWidth / 2;
      const isTop   = t.clientY < window.innerHeight / 2;
      if (isRight) moveRight(); else moveLeft();
      if (isTop) speedUp(); else slowDown();
    }
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
  if (activeTouches.size === 0) resetBoost();
}, { passive: false });

document.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
  if (activeTouches.size === 0) resetBoost();
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (gameState === 'playing') e.preventDefault();
}, { passive: false });

// Buton event listener'ları — onclick attribute yerine JS ile bağla
document.addEventListener('DOMContentLoaded', () => {});
function bindButtons() {
  const btnStart = document.getElementById('btn-start');
  const btnRestart = document.getElementById('btn-restart');
  const btnMenu = document.getElementById('btn-menu');
  const muteBtn = document.getElementById('mute-btn');

  if (btnStart) {
    btnStart.addEventListener('click', startGame);
    btnStart.addEventListener('touchend', e => { e.preventDefault(); startGame(); });
  }
  if (btnRestart) {
    btnRestart.addEventListener('click', restartGame);
    btnRestart.addEventListener('touchend', e => { e.preventDefault(); restartGame(); });
  }
  if (btnMenu) {
    btnMenu.addEventListener('click', showStart);
    btnMenu.addEventListener('touchend', e => { e.preventDefault(); showStart(); });
  }
  if (muteBtn) {
    muteBtn.addEventListener('click', toggleMute);
    muteBtn.addEventListener('touchend', e => { e.preventDefault(); toggleMute(); });
  }
}

// ---- Game Loop ----
let lastTime = 0;
function loop(ts) {
  animId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (gameState !== 'playing') {
    renderer.render(scene, camera);
    return;
  }

  // Increase speed over time + player boost/brake
  let targetSpeed = baseSpeed + correctCount * 0.0015;
  targetSpeed = Math.min(targetSpeed, 0.28);
  if (speedBoost === 1)  targetSpeed = Math.min(targetSpeed + BOOST_AMOUNT, MAX_BOOST_SPEED);
  if (speedBoost === -1) targetSpeed = Math.max(targetSpeed - BRAKE_AMOUNT, MIN_SPEED);
  speed += (targetSpeed - speed) * 0.08; // smooth transition

  // Move road tiles
  roadTiles.forEach(tile => {
    tile.position.z += speed;
    if (tile.position.z > 24) tile.position.z -= 80;
  });

  // Move bg objects
  bgObjects.forEach(b => {
    b.position.z += speed;
    if (b.position.z > 20) b.position.z -= 100;
  });

  // Move gates
  gates.forEach(gate => {
    gate.group.position.z += speed;
  });

  // Spawn gates
  nextGateZ += speed;
  if (nextGateZ >= 0) {
    spawnGate(-50);
    nextGateZ = -GATE_SPACING;
  }

  // Collision detection
  gates.forEach(gate => {
    if (gate.passed) return;
    const gz = gate.group.position.z;
    if (gz > 2 && gz < 6) {
      gate.passed = true;
      const px = player.position.x;
      const leftHit = Math.abs(px - gate.left.xPos) < GATE_WIDTH / 2 + 0.3;
      const rightHit = Math.abs(px - gate.right.xPos) < GATE_WIDTH / 2 + 0.3;

      if (leftHit) {
        gate.left.isCorrect ? handleCorrect() : handleWrong();
      } else if (rightHit) {
        gate.right.isCorrect ? handleCorrect() : handleWrong();
      }
    }
  });

  // Remove old gates
  for (let i = gates.length - 1; i >= 0; i--) {
    if (gates[i].group.position.z > 15) {
      scene.remove(gates[i].group);
      gates.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * 1.5;
    p.mesh.position.x += p.vel.x;
    p.mesh.position.y += p.vel.y;
    p.mesh.position.z += p.vel.z + speed;
    p.vel.y -= 0.004;
    p.mesh.material.opacity = p.life;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // Player movement
  player.position.x += (playerTargetX - player.position.x) * 0.18;
  player.position.y += (playerTargetY - player.position.y) * 0.2;

  // Run animation
  runCycle += dt * 8;
  if (playerParts.legL) playerParts.legL.rotation.x = Math.sin(runCycle) * 0.5;
  if (playerParts.legR) playerParts.legR.rotation.x = Math.sin(runCycle + Math.PI) * 0.5;
  if (playerParts.armL) playerParts.armL.rotation.x = Math.sin(runCycle + Math.PI) * 0.4;
  if (playerParts.armR) playerParts.armR.rotation.x = Math.sin(runCycle) * 0.4;
  if (playerParts.body) playerParts.body.rotation.z = Math.sin(runCycle * 0.5) * 0.04;
  if (playerParts.head) playerParts.head.rotation.y = Math.sin(runCycle * 0.5) * 0.08;

  // Camera shake
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    shakeX = (Math.random() - 0.5) * shakeAmt;
    shakeY = (Math.random() - 0.5) * shakeAmt;
  }

  camera.position.set(player.position.x * 0.3 + shakeX, 3.5 + shakeY, 7);
  camera.lookAt(player.position.x * 0.15, 1, -8);

  renderer.render(scene, camera);
}

// ---- Resize ----
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 300));

// ---- Game States ----
function startGame() {
  if (!THREE) return;

  // Reset state
  score = 0; lives = 3; combo = 0; correctCount = 0; wrongCount = 0;
  speed = baseSpeed; runCycle = 0;
  currentLane = 1; playerTargetX = 0;
  shakeTimer = 0;
  nextGateZ = -GATE_SPACING;
  pendingPairs = [];
  lastWordIndex = -1;

  // Clear gates
  gates.forEach(g => scene.remove(g.group));
  gates.length = 0;
  particles.forEach(p => scene.remove(p.mesh));
  particles.length = 0;

  player.position.set(0, 0, 3);

  startScreen.classList.add('hidden');
  gameoverScreen.classList.add('hidden');
  hudEl.style.display = 'flex';
  touchHint.style.display = 'block';
  touchHint.textContent = '◀▶ Sol/Sağ  |  ↑ Hızlan  ↓ Yavaşla';

  updateHUD();
  gameState = 'playing';
  document.getElementById('touch-zones').style.display = 'block';
  startMusic();
}

function restartGame() {
  stopCountdown();
  gameoverScreen.classList.add('hidden');
  stopMusic();
  startGame();
}

function showStart() {
  stopCountdown();
  gameoverScreen.classList.add('hidden');
  stopMusic();
  startScreen.classList.remove('hidden');
  gameState = 'menu';
}

// ---- Init ----
function init() {
  // Try loading Three.js
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js';
  script.onload = () => {
    THREE = window.THREE;
    initThree();
    onResize();
    bindButtons();
    document.getElementById('loading-overlay').style.display = 'none';
    startScreen.classList.remove('hidden');
    requestAnimationFrame(loop);
  };
  script.onerror = () => {
    document.getElementById('loading-overlay').innerHTML =
      '<div style="color:#ff4444;text-align:center;padding:30px">⚠️ Three.js yüklenemedi.<br>Lütfen internet bağlantınızı kontrol edin ve sayfayı yenileyin.</div>';
  };
  document.head.appendChild(script);
}

// Prevent default touch behaviors
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());

// Fix iOS 100vh
function setVH() {
  document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
}
window.addEventListener('resize', setVH);
setVH();

init();
</script>
